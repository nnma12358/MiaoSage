# ============================================================
# 苗绣·识裳 — Nginx 性能优化版
# 前端 SPA + API 反向代理 + 静态资源强缓存 + SSE 流式支持
# ============================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---- Gzip 压缩 ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        image/svg+xml;

    # ---- 安全头 ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # ========== 性能监控 API ==========
    location /stats {
        proxy_pass http://yolo:8000/stats;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 5s;
    }

    # ========== YOLOv8n 目标检测 API ==========
    location /detect {
        proxy_pass http://yolo:8000/detect;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        client_max_body_size 10m;
    }

    location /health {
        proxy_pass http://yolo:8000/health;
        proxy_set_header Host $host;
        proxy_read_timeout 5s;
    }

    # ========== LLM 对话 API ==========
    location /chat {
        proxy_pass http://llm:8001/chat;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 180s;
        proxy_buffering off;               # SSE 流式必须关闭缓冲
        chunked_transfer_encoding on;
    }

    location /chat/stream {
        proxy_pass http://llm:8001/chat/stream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_buffering off;
        chunked_transfer_encoding on;
        # 禁用代理缓存，确保 SSE 实时推送
        proxy_cache off;
        add_header Cache-Control "no-cache";
        add_header X-Accel-Buffering "no";
    }

    location /health/llm {
        proxy_pass http://llm:8001/health;
        proxy_set_header Host $host;
        proxy_read_timeout 5s;
    }

    # ========== 静态资源强缓存 ==========
    # SvelteKit 构建产物带内容哈希，可永久缓存
    location /_app/immutable {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 其他 _app 资源（非哈希的短期缓存）
    location /_app {
        expires 7d;
        add_header Cache-Control "public";
    }

    # robots.txt / favicon 等
    location = /robots.txt {
        expires 1d;
        access_log off;
    }

    # ========== SPA 路由回退 ==========
    location / {
        try_files $uri $uri/ /index.html;
        # index.html 不缓存（确保更新即时生效）
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
