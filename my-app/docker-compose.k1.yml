# ============================================================
# 苗绣·识裳 — K1 多容器架构
# ============================================================
# 4 个独立容器，host 网络模式，通过 localhost 互访
#
# 启动：
#   docker compose -f docker-compose.k1.yml up -d --build
#
# 端口：
#   443  → 网关（前端 SPA + API 路由）
#   8000 → YOLO 检测
#   8001 → ASR 语音识别
#   8002 → TTS 语音合成
#
# ⚠️ K1 仅 2GB 内存，4 容器总上限 ~1.6GB。
#    若 OOM，可降低各容器 memory limit 或只启动部分服务。
# ============================================================

services:
  # ---- YOLO 检测 ----
  yolo:
    build:
      context: .
      dockerfile: Dockerfile.yolo
    image: miao-xiu:yolo
    container_name: miao-yolo
    restart: unless-stopped
    network_mode: host
    environment:
      - YOLO_MODEL=${YOLO_MODEL:-yolov8n.onnx}
    volumes:
      - k1-cache:/root/.cache
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 500M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

  # ---- ASR 语音识别 ----
  asr:
    build:
      context: .
      dockerfile: Dockerfile.asr
    image: miao-xiu:asr
    container_name: miao-asr
    restart: unless-stopped
    network_mode: host
    environment:
      - SPACEMIT_NLP_DIR=/opt/spacemit/nlp
    volumes:
      - k1-cache:/root/.cache
      - /home/bainbu/spacemit-demo/examples/NLP:/opt/spacemit/nlp:ro
      - /usr/lib/libortextensions.so:/usr/lib/libortextensions.so:ro
      - /usr/lib/libortextensions.so.0:/usr/lib/libortextensions.so.0:ro
      - /usr/lib/libortextensions.so.0.12.0:/usr/lib/libortextensions.so.0.12.0:ro
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 400M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

  # ---- TTS 语音合成 ----
  tts:
    build:
      context: .
      dockerfile: Dockerfile.tts
    image: miao-xiu:tts
    container_name: miao-tts
    restart: unless-stopped
    network_mode: host
    environment:
      - SPACEMIT_NLP_DIR=/opt/spacemit/nlp
    volumes:
      - k1-cache:/root/.cache
      - /home/bainbu/spacemit-demo/examples/NLP:/opt/spacemit/nlp:ro
      - /usr/lib/libortextensions.so:/usr/lib/libortextensions.so:ro
      - /usr/lib/libortextensions.so.0:/usr/lib/libortextensions.so.0:ro
      - /usr/lib/libortextensions.so.0.12.0:/usr/lib/libortextensions.so.0.12.0:ro
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 500M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

  # ---- API 网关 ----
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.k1
    image: miao-xiu:gateway
    container_name: miao-gateway
    restart: unless-stopped
    network_mode: host
    depends_on:
      - yolo
      - asr
      - tts
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-http://127.0.0.1:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5-instruct}
      - YOLO_URL=http://127.0.0.1:8000
      - ASR_URL=http://127.0.0.1:8001
      - TTS_URL=http://127.0.0.1:8002
    volumes:
      - k1-cache:/root/.cache
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://127.0.0.1:443/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 200M
        reservations:
          cpus: '0.3'
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

volumes:
  k1-cache:
