# ============================================================
# 苗绣·识裳 — Docker Compose 编排（性能优化版）
#
#   nginx   :80   → 前端 SPA + API 反向代理 + 静态资源缓存
#   yolo    :8000  → YOLOv8n 目标检测 + /stats 性能监控
#   llm     :8001  → Qwen2.5-Instruct 对话（流式 SSE）+ /stats
#   ollama  :11434 → Ollama 推理引擎
#
# 启动：
#   docker compose up -d
#   docker compose exec ollama ollama pull qwen2.5:0.5b
# ============================================================

services:
  # ========== 1. Nginx 前端 + API 反向代理 ==========
  nginx:
    image: nginx:alpine
    container_name: miao-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./build:/usr/share/nginx/html:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      yolo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M
    # 日志轮转
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - miao-net

  # ========== 2. YOLOv8n 目标检测 ==========
  yolo:
    build:
      context: .
      dockerfile: server/Dockerfile.yolo
    image: miao-yolo:latest
    container_name: miao-yolo
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - YOLO_MODEL=yolov8n.pt
    volumes:
      - yolo-cache:/root/.cache/ultralytics
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - miao-net

  # ========== 3. Qwen2.5-Instruct 对话 ==========
  llm:
    build:
      context: .
      dockerfile: server/Dockerfile.llm
    image: miao-llm:latest
    container_name: miao-llm
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:0.5b
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - miao-net

  # ========== 4. Ollama 推理引擎 ==========
  ollama:
    image: ollama/ollama:latest
    container_name: miao-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_HOST=0.0.0.0
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '1.0'
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - miao-net

networks:
  miao-net:
    driver: bridge

volumes:
  yolo-cache:
  ollama-data:
