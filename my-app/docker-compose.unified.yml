# ============================================================
# 苗绣·识裳 — 统一 Compose（单容器 + 可选 Ollama）
# ============================================================
# 架构：一个 Python 进程 = 前端 SPA + YOLO + LLM 代理 + 性能监控
#
# 启动（仅图像识别）：
#   docker compose -f docker-compose.unified.yml up -d
#
# 启动（含 LLM 对话，需提前 docker compose pull ollama）：
#   docker compose -f docker-compose.unified.yml --profile llm up -d
# ============================================================

services:
  # ========== 一体化服务（前端 + YOLO + LLM 代理）==========
  app:
    build:
      context: .
      dockerfile: Dockerfile.unified
    image: miao-xiu:unified
    container_name: miao-app
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - YOLO_MODEL=yolov8n.onnx
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5-instruct
      # 以下仅 K1 板启用
      # - SPACEMIT_NLP_DIR=/opt/spacemit-demo/examples/NLP
    volumes:
      # YOLO 模型缓存（避免每次重启重新下载）
      - yolo-cache:/root/.cache/ultralytics
      # ONNX 模型持久化
      - ./models:/app/models:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - miao-net

  # ========== Ollama（可选，需要 LLM 对话时启用）==========
  ollama:
    image: ollama/ollama:latest
    container_name: miao-ollama
    restart: unless-stopped
    profiles:
      - llm          # 默认不启动，加 --profile llm 才启动
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_HOST=0.0.0.0
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '1.0'
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - miao-net

networks:
  miao-net:
    driver: bridge

volumes:
  yolo-cache:
  ollama-data:
